{{ define "title" }}Contact | Shane Bernhardson{{ end }}

{{ define "main" }}
<div class="contact-centered">
  <div class="contact-form">
    <div class="section-label">// Get In Touch</div>
    <div class="form-title">LET'S CONNECT</div>
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/contact/success/">
      <input type="hidden" name="form-name" value="contact">
      <p style="display:none"><label>Don't fill this out: <input name="bot-field"></label></p>
      <div class="form-row">
        <div class="form-group">
          <label for="fname">First Name</label>
          <input type="text" id="fname" name="first-name" placeholder="Jane" required>
        </div>
        <div class="form-group">
          <label for="lname">Last Name</label>
          <input type="text" id="lname" name="last-name" placeholder="Doe" required>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" required>
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject" required>
          <option value="">Select a topic...</option>
          <option>Research Collaboration</option>
          <option>Speaking / Keynote</option>
          <option>Performance Consulting</option>
          <option>Media Inquiry</option>
          <option>General Question</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Tell me about your inquiry..." required></textarea>
      </div>
      <button type="submit" class="btn-primary form-submit">Send Message</button>
    </form>
  </div>
</div>
{{ end }}

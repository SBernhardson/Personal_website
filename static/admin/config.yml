backend:
  name: git-gateway
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "select", options: ["Physiology", "Strength Science", "Recovery", "Tech & Analytics", "Nutrition", "Psychology", "General"] }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short summary shown on blog cards (1-2 sentences)" }
      - { label: "Emoji Icon", name: "icon", widget: "string", default: "📝", hint: "Single emoji used as the post thumbnail" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
